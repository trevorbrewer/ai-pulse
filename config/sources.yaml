nitter:
  # Tried in order; first live response per handle wins.
  # Keep this list fresh: https://github.com/zedeus/nitter/wiki/Instances
  instances:
    - nitter.privacydev.net
    - nitter.poast.org
    - nitter.cz
    - nitter.1d4.us
    - xcancel.com

arxiv:
  category: cs.AI
  # Additional sub-categories to pull alongside cs.AI
  extra_categories:
    - cs.LG
    - cs.CL
  max_results: 50

hackernews:
  endpoint: https://hn.algolia.com/api/v1/search
  query: AI OR "machine learning" OR LLM
  min_points: 50
  tags: story

