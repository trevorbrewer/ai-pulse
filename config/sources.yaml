nitter:
  # Tried in order; first live response per handle wins.
  # Keep this list fresh: https://github.com/zedeus/nitter/wiki/Instances
  instances:
    - nitter.privacydev.net
    - nitter.poast.org
    - nitter.cz
    - nitter.1d4.us
    - xcancel.com

arxiv:
  category: cs.AI
  # Additional sub-categories to pull alongside cs.AI
  extra_categories:
    - cs.LG
    - cs.CL
  max_results: 50

hackernews:
  # search_by_date ranks by recency; /search ranks by relevance and under-returns with date filters.
  # Algolia on hn.algolia.com treats OR as a literal word — use a single keyword, not boolean syntax.
  # "AI" is broad enough to catch AI/ML stories; Claude's summarise step filters out noise.
  endpoint: https://hn.algolia.com/api/v1/search_by_date
  query: AI
  # min_points applied client-side (points is not in numericAttributesForFiltering on this index)
  # 10 is realistic for stories that are only a few hours old at 11:00 UTC cron time
  min_points: 10
  tags: story

